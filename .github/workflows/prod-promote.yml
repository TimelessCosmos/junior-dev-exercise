name: Production Promotion

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Staging tag"
        required: true

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          if [[ ! "${{ github.event.inputs.tag }}" =~ ^stg- ]]; then
            echo "Only stg-* tags allowed"
            exit 1
          fi

      - name: Verify tag exists
        run: |
          git fetch --tags
          git rev-parse refs/tags/${{ github.event.inputs.tag }}

      - name: Checkout Tag
        run: |
          git checkout tags/${{ github.event.inputs.tag }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build
        run: mvn clean package

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Merge into main
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}

          git fetch origin

          git checkout main

          git merge ${{ github.event.inputs.tag }} \
            --no-ff \
            -m "Promote ${{ github.event.inputs.tag }}"

          git push origin main

      - name: Create Release Tag
        id: release
        run: |
          TAG=release-${{ github.run_number }}

          git tag $TAG
          git push origin $TAG

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
